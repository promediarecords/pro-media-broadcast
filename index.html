<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#facc15" />

  <title>Pro Media Broadcast</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#000; color:#e5e7eb; }
    .gold { color:#facc15; }
    .btn { background:#facc15; color:#000; }
  </style>
</head>

<body class="min-h-screen">

  <!-- HEADER -->
  <header class="flex items-center justify-between p-4 border-b border-gray-800">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center text-black font-bold">🎧</div>
      <h1 class="text-xl font-semibold">
        PRO MEDIA <span class="gold">BROADCAST</span>
      </h1>
    </div>

    <button onclick="shareApp()" class="text-sm text-gray-300 hover:text-white">
      Share Platform
    </button>
  </header>

  <!-- HERO -->
  <section class="p-6 text-center">
    <h2 class="text-3xl font-bold mb-3">
      If You Feel Stuck, Listen to This
    </h2>
    <p class="text-gray-400 mb-6">
      A message about finding clarity when life feels uncertain.
    </p>

    <audio id="player" controls class="w-full max-w-xl mx-auto">
      <source src="https://foasfxrufxsljolvcetl.supabase.co/storage/v1/object/public/audio-files/if%20you%20feel%20stuck%20listen%20to%20this%20.mp3" type="audio/mpeg">
    </audio>
  </section>

  <!-- FOOTER -->
  <footer class="text-center text-gray-500 text-sm py-6">
    © 2026 Pro Media Broadcast
  </footer>

  <script>
    function shareApp() {
      const url = "https://pro-media-broadcast.vercel.app/";
      if (navigator.share) {
        navigator.share({
          title: "Pro Media Broadcast",
          text: "Listen to powerful messages",
          url
        });
      } else {
        navigator.clipboard.writeText(url);
        alert("Link copied");
      }
    }
  </script>

</body>
</html>
